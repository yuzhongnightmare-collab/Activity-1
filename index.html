<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShoeStyle</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header>
    <h1>ShoeStyle</h1>
    <nav>
      <a href="#">Home</a>
      <a href="#">Shop</a>
      <a href="#">About</a>
      <a href="#">Contact</a>
    </nav>
  </header>

  <section class="hero">
    <div>
      <h2>Step Into Style</h2>
      <p>Discover the latest trends in footwear</p>
      <button>Shop Now</button>
    </div>
  </section>

  <section class="products">
    <h2>Featured Shoes</h2>
    <div class="product-grid">
      
      <div class="product-card">
        <img src="https://images.unsplash.com/photo-1525966222134-fcfa99b8ae77" alt="Shoe">
        <h3>Running Shoes</h3>
        <p>₱4,499</p>
      </div>

      <div class="product-card">
        <img src="https://images.unsplash.com/photo-1519741497674-611481863552" alt="Shoe">
        <h3>Casual Sneakers</h3>
        <p>₱3,299</p>
      </div>

      <div class="product-card">
        <img src="https://images.unsplash.com/photo-1600185365483-26d7a4cc7519" alt="Shoe">
        <h3>Sport Shoes</h3>
        <p>₱4,999</p>
      </div>

    </div>
  </section>

  <footer>
    <p>© 2026 ShoeStyle. All rights reserved.</p>
  </footer>

</body>
</html>
